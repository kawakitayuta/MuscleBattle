<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuscleBattle — ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#18181f;--bg2:#22222c;--bg3:#2c2c38;--border:rgba(255,255,255,0.10);--border-bright:rgba(255,255,255,0.22);--text:#f2f2f5;--muted:#a0a0b0;--accent:#e8f000;--accent2:#ff4f4f;--accent3:#00c9a7;--font:'Inter','Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-height:1.5;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeInRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoDot{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.left{animation:fadeInLeft 0.6s ease forwards;}
.right{animation:fadeInRight 0.6s ease 0.1s both;}
.logo-dot{animation:logoDot 0.5s cubic-bezier(0.22,1,0.36,1) 0.4s both;}
.hero-tag{opacity:0;animation:fadeUp 0.5s ease 0.5s forwards;}
.hero-title{opacity:0;animation:fadeUp 0.5s ease 0.65s forwards;}
.hero-desc{opacity:0;animation:fadeUp 0.5s ease 0.8s forwards;}
.stat-item:nth-child(1){opacity:0;animation:countUp 0.4s ease 0.9s forwards;}
.stat-item:nth-child(2){opacity:0;animation:countUp 0.4s ease 1.0s forwards;}
.stat-item:nth-child(3){opacity:0;animation:countUp 0.4s ease 1.1s forwards;}
.fade-form{opacity:0;animation:fadeUp 0.4s ease forwards;}
.form-input:focus{border-color:var(--accent);}
.btn-primary{transition:opacity 0.15s,transform 0.15s;}
.btn-primary:hover{opacity:0.85;transform:translateY(-1px);}
.split{display:flex;min-height:100vh;}
.left{flex:1;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;justify-content:center;padding:60px;}
.right{width:480px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:60px;}
.logo{font-size:20px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:60px;}
.logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;}
.hero-tag{font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
.hero-title{font-size:46px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:20px;}
.hero-title span{color:var(--accent);}
.hero-desc{font-size:15px;color:var(--muted);line-height:1.8;max-width:420px;margin-bottom:40px;}
.stats-row{display:flex;gap:32px;}
.stat-num{font-size:30px;font-weight:900;color:var(--text);}
.stat-label{font-size:12px;color:var(--muted);margin-top:2px;}
.tab-row{display:flex;gap:0;border:0.5px solid var(--border-bright);border-radius:8px;overflow:hidden;margin-bottom:28px;}
.tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);background:transparent;border:none;font-family:var(--font);transition:all 0.2s;}
.tab.active{background:var(--accent);color:#000;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.06em;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border-bright);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:12px 14px;outline:none;transition:border-color 0.2s;}
.form-input::placeholder{color:var(--muted);}
.btn-primary{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;letter-spacing:0.04em;margin-top:8px;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border);}
.form-note{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6;}
.form-note a{color:var(--accent);text-decoration:none;}
.error-msg{font-size:12px;color:var(--accent2);margin-top:8px;display:none;}
@media(max-width:900px){.split{flex-direction:column;}.left{display:none;}.right{width:100%;padding:40px 24px;}}
</style>
</head>
<body>
<div class="split">
  <div class="left">
    <div class="logo"><div class="logo-dot"></div>MuscleBattle</div>
    <div class="hero-tag">友達を倒すための筋トレSNS</div>
    <div class="hero-title">筋トレを<br><span>競技</span>にする。</div>
    <div class="hero-desc">ライバルと直接対決、リアルタイムランキング、煽り通知。記録するだけじゃ続かない。バトルするから続く。</div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-num" id="s1">0</div><div class="stat-label">アクティブユーザー</div></div>
      <div class="stat-item"><div class="stat-num" id="s2">0</div><div class="stat-label">今週の総ボリューム(kg)</div></div>
      <div class="stat-item"><div class="stat-num" id="s3">0%</div><div class="stat-label">30日継続率</div></div>
    </div>
  </div>
  <div class="right">
    <div class="logo" style="margin-bottom:36px"><div class="logo-dot"></div>MuscleBattle</div>
    <div class="tab-row fade-form" style="animation-delay:0.3s">
      <button class="tab active" onclick="switchTab(this,'login')">ログイン</button>
      <button class="tab" onclick="switchTab(this,'register')">新規登録</button>
    </div>
    <div id="login-form">
      <div class="form-group fade-form" style="animation-delay:0.38s">
        <label class="form-label">ユーザー名</label>
        <input class="form-input" type="text" id="login-name" placeholder="ユーザー名を入力">
      </div>
      <div class="form-group fade-form" style="animation-delay:0.44s">
        <label class="form-label">パスワード</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••">
      </div>
      <div class="fade-form" style="animation-delay:0.50s">
        <button class="btn-primary" onclick="login()">ログイン</button>
        <div class="error-msg" id="login-error"></div>
      </div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="form-label">ユーザー名</label>
        <input class="form-input" type="text" id="reg-name" placeholder="ライバルに見える名前">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input class="form-input" type="password" id="reg-password" placeholder="8文字以上">
      </div>
      <button class="btn-primary" onclick="register()">無料で始める</button>
      <div class="error-msg" id="register-error"></div>
      <div class="form-note" style="margin-top:12px">登録することで利用規約・プライバシーポリシーに同意します。</div>
    </div>
  </div>
</div>
<script>
const API = 'https://musclebattle-api.onrender.com';

function switchTab(el, key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('login-form').style.display = key === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = key === 'register' ? 'block' : 'none';
}

async function login() {
  const name = document.getElementById('login-name').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!name || !password) {
    errEl.textContent = 'ユーザー名とパスワードを入力してください';
    errEl.style.display = 'block';
    return;
  }
  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `username=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user_id', data.user_id);
      localStorage.setItem('user_name', data.name);
      location.href = 'home.html';
    } else {
      errEl.textContent = 'ユーザー名またはパスワードが違います';
      errEl.style.display = 'block';
    }
  } catch (e) {
    errEl.textContent = 'サーバーに接続できません。しばらく待ってから試してください。';
    errEl.style.display = 'block';
  }
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('register-error');
  errEl.style.display = 'none';
  if (!name || !password) {
    errEl.textContent = 'ユーザー名とパスワードを入力してください';
    errEl.style.display = 'block';
    return;
  }
  try {
    const res = await fetch(`${API}/register?name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`, {
      method: 'POST'
    });
    const data = await res.json();
    if (res.ok) {
      const loginRes = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`
      });
      const loginData = await loginRes.json();
      if (loginRes.ok) {
        localStorage.setItem('token', loginData.access_token);
        localStorage.setItem('user_id', loginData.user_id);
        localStorage.setItem('user_name', loginData.name);
        location.href = 'home.html';
      }
    } else {
      errEl.textContent = '登録に失敗しました';
      errEl.style.display = 'block';
    }
  } catch (e) {
    errEl.textContent = 'サーバーに接続できません。しばらく待ってから試してください。';
    errEl.style.display = 'block';
  }
}

function animateCount(el, target, suffix, duration) {
  let start = 0;
  const t = setInterval(() => {
    start += Math.ceil(target / 60);
    if (start >= target) { start = target; clearInterval(t); }
    el.textContent = start.toLocaleString() + (suffix || '');
  }, duration / 60);
}
setTimeout(() => {
  animateCount(document.getElementById('s1'), 2481, '', 1200);
  animateCount(document.getElementById('s2'), 18200, '', 1400);
  setTimeout(() => {
    let n = 0;
    const t = setInterval(() => { n += 2; if (n >= 94) { n = 94; clearInterval(t); } document.getElementById('s3').textContent = n + '%'; }, 25);
  }, 200);
}, 900);
</script>
</body>
</html>
